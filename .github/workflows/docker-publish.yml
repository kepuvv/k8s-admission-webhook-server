name: Build and publish Docker image

on:
  push:
    branches:
      - main

jobs:
  test-py-script:
    runs-on: ubuntu-latest

    container:
      image: python:3.12-slim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: python -m py_compile
        run: python -m py_compile webhook-server.py

  build-and-push:
    runs-on: ubuntu-latest

    needs: test-py-script

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kube-admission-webhook-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/kube-admission-webhook-server:${{ env.SHORT_SHA }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/kube-admission-webhook-server:latest
          cache-to: type=inline
