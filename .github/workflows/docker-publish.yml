name: Build and publish Docker image

on:
  push:
    branches:
      - main

jobs:
  test-py-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: python -m py_compile $(git ls-files '*.py')

  build-and-push:
    runs-on: ubuntu-latest

    needs: test-py-script

    # for GITHUB_TOKEN
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kube-admission-webhook-server:${{ env.SHORT_SHA }}
            ${{ secrets.DOCKERHUB_USERNAME }}/kube-admission-webhook-server:latest
            ghcr.io/${{ secrets.DOCKERHUB_USERNAME }}/kube-admission-webhook-server:latest
            ghcr.io/${{ secrets.DOCKERHUB_USERNAME }}/kube-admission-webhook-server:${{ env.SHORT_SHA }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/kube-admission-webhook-server:latest
          cache-to: type=inline
